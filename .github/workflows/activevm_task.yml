name: Activevm-Task
on:
  workflow_dispatch:
permissions:
  actions: write
  contents: read

jobs:
  run_activevm_task:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Activevm-Task-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 复制脚本到工作目录
        run: cp private/activevm_task.py activevm_task.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org | sed 's/\([0-9]*\.[0-9]*\.\)[0-9]*\.[0-9]*/\1**.**/g'
          echo ""

      - name: 🐍 安装 Python 依赖
        run: pip install requests

      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          ACTIVEVM_ACCOUNT: ${{ secrets.ACTIVEVM_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
          CRON_JOB: ${{ secrets.CRON_JOB }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: python activevm_task.py

      - name: 📤 推回私库
        if: always()
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          cd private
          if ! git diff --quiet; then
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git add activevm_task.py
            git commit -m "🔄 自动更新 Session [skip ci]"
            git push "https://${PRIVATE_REPO_TOKEN}@github.com/${{ github.repository_owner }}/Activevm-Task-Private.git" HEAD
            echo "✅ 推送成功"
          else
            echo "ℹ️ 无变更，跳过推送"
          fi

      - name: 🧽 清理进程和临时文件
        if: always()
        run: |
          pkill -f gost || true
          pkill -f python || true
          rm -f gost gost_*.tar.gz gost.log activevm_task.py

      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --repo ${{ github.repository }} --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id --repo ${{ github.repository }} || true
            fi
          done
